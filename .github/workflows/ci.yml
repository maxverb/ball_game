name: CI

# Since GitHub Pages is configured as "Deploy from a branch" (main /) and
# the built Vite output lives at the repo root as `index.html`, `build/`
# and `assets/`, we do NOT deploy from a workflow. This file just runs
# the type-check, unit tests and vite build as a PR safety net.

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Extract original SWING assets
        run: node tools/extract-all.mjs

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: web
        run: npx vitest run

      - name: Build web app
        working-directory: web
        run: npx vite build
