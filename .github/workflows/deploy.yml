name: Deploy SWING web to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued. Don't cancel the in-progress run so
# we don't leave Pages in a half-deployed state.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Extract original SWING assets
        run: node tools/extract-all.mjs

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Type-check
        working-directory: web
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: web
        run: npx vitest run

      - name: Build web app
        working-directory: web
        run: npx vite build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
